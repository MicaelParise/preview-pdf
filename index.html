<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de PDF</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M6 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6H6z'/%3E%3C/svg%3E">

    <style>[x-cloak] { display: none !important; }</style>

    <script>
        const temaSalvo = localStorage.getItem('tema');
        const prefereEscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (temaSalvo === 'dark' || (!temaSalvo && prefereEscuro)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>

    <script src="js/app.js" defer></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body
    x-data="visualizadorPdf()"
    class="min-h-screen bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">

    <div class="mx-auto max-w-6xl px-4 py-10 md:px-8 md:py-14">

        <header class="mb-8 md:mb-10">
            <h1 class="text-2xl font-bold tracking-tight md:text-3xl">Visualizador de PDF</h1>
            <p class="mt-1 text-slate-600 dark:text-slate-400">Escolha um arquivo no seu dispositivo para visualizar o conteúdo direto no navegador.</p>
        </header>

        <main class="grid grid-cols-1 gap-6 md:grid-cols-[360px_1fr] md:items-start">

            <section class="rounded-2xl border-2 border-slate-300 bg-white p-6 shadow-lg dark:border-slate-700 dark:bg-slate-900">

                <template x-if="!arquivo">
                    <div
                        x-cloak
                        @dragover.prevent="arrastando = true"
                        @dragleave.prevent="arrastando = false"
                        @drop.prevent="soltar($event)"
                        :class="arrastando ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/40' : 'border-slate-300 dark:border-slate-700'"
                        class="flex flex-col items-center gap-3 rounded-xl border-2 border-dashed px-4 py-10 text-center transition-colors">

                        <svg class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 8.25 12 3.75m0 0L7.5 8.25M12 3.75v12.75" />
                        </svg>

                        <p class="text-sm text-slate-600 dark:text-slate-400">Arraste um arquivo PDF até aqui ou</p>

                        <label class="cursor-pointer rounded-xl border-2 border-indigo-600 bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-md transition hover:border-indigo-500 hover:bg-indigo-500">
                            Selecionar arquivo
                            <input x-ref="entradaArquivo" @change="selecionar($event)" type="file" accept="application/pdf" class="hidden">
                        </label>
                    </div>
                </template>

                <template x-if="arquivo">
                    <div x-cloak x-transition class="flex flex-col gap-4">

                        <div class="flex items-start gap-3 rounded-xl border-2 border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-800/60">
                            <svg class="h-8 w-8 shrink-0 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                            </svg>
                            <div class="min-w-0 flex-1">
                                <p class="truncate text-sm font-medium" x-text="arquivo.name"></p>
                                <p class="text-xs text-slate-500 dark:text-slate-400" x-text="tamanho()"></p>
                            </div>
                        </div>

                        <a :href="urlArquivo" target="_blank" rel="noopener" class="flex items-center justify-center gap-2 rounded-xl border-2 border-slate-300 px-4 py-2 text-sm font-medium transition hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                            </svg>
                            Abrir em nova guia
                        </a>

                        <button @click="remover()" class="flex items-center justify-center gap-2 rounded-xl border-2 border-red-200 px-4 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50 dark:border-red-900 dark:text-red-400 dark:hover:bg-red-950/40">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                            </svg>
                            Remover arquivo
                        </button>
                    </div>
                </template>

            </section>

            <section class="overflow-hidden rounded-2xl border-2 border-slate-300 bg-white shadow-lg dark:border-slate-700 dark:bg-slate-900">

                <div x-show="!arquivo" x-cloak class="flex h-[50vh] flex-col items-center justify-center gap-3 p-6 text-center text-slate-400 dark:text-slate-600 md:h-[70vh]">
                    <svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                    </svg>
                    <p class="text-sm">A pré-visualização aparecerá aqui</p>
                </div>

                <embed x-show="arquivo" x-cloak :src="urlArquivo" type="application/pdf" class="h-[50vh] w-full md:h-[70vh]">

            </section>

        </main>

    </div>

    <button
        @click="alternarTema()"
        class="fixed bottom-6 right-6 z-50 flex h-12 w-12 items-center justify-center rounded-full border-2 border-slate-300 bg-white/70 shadow-lg backdrop-blur-md transition hover:scale-105 dark:border-slate-600 dark:bg-slate-800/70"
        aria-label="Alternar tema claro ou escuro">

        <svg x-show="!escuro" x-cloak class="h-5 w-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
        <svg x-show="escuro" x-cloak class="h-5 w-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
    </button>

</body>
</html>
